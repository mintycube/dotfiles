;==========================================================

; File Inclusion
include-file = ~/.config/bspwm/polybar/colors.ini
include-file = ~/.config/bspwm/polybar/modules.ini

[bar/main]
tray-position = none
monitor = eDP-1
width =  100%
height = 15
padding-left =1
padding-right =0
line-size = 1

background = ${colors.background}
foreground = ${colors.foreground}
bottom = true
fixed-center = true
border-top-size = 3
border-bottom-size = 3
border-top-color = ${colors.background}
border-bottom-color = ${colors.background}

wm-restack = bspwm
override-redirect = false
enable-ipc = true

; not shown: launcher currency
modules-left = bspwm pad polywins
modules-right =alsa pad battery pad wlan pad time pad powermenu

font-0 = JetBrainsMono Nerd Font:style=Bold:pixelsize=9;3
font-1 = JetBrainsMono Nerd Font:size=9;3
font-2 = Material Design Icons Desktop:style=Bold:size=9;3
font-3 = Unifont:fontformat=truetype:size=9;3
font-4 = JetBrainsMono Nerd Font:style=Bold:pixelsize=12;4
font-5 = JetBrainsMono Nerd Font:style=Bold:pixelsize=14;4

; тЦИтЦАтЦДтЦАтЦИ тЦИтЦАтЦИ тЦИтЦАтЦД тЦИтЦСтЦИ тЦИтЦСтЦС тЦИтЦАтЦА тЦИтЦА
; тЦИтЦСтЦАтЦСтЦИ тЦИтЦДтЦИ тЦИтЦДтЦА тЦИтЦДтЦИ тЦИтЦДтЦД тЦИтЦИтЦД тЦДтЦИ

[module/mpd]
type = internal/mpd

host = 127.0.0.1
; port = 6600

; Seconds to sleep between progressbar/song timer sync
; Default: 1
interval = 2
; Available tags:
;   <label-song> (default)
;   <label-time>
;   <bar-progress>
;   <toggle> - gets replaced with <icon-(pause|play)>
;   <toggle-stop> - gets replaced with <icon-(stop|play)>
;   <icon-random>
;   <icon-repeat>
;   <icon-repeatone> (deprecated)
;   <icon-single> - Toggle playing only a single song. Replaces <icon-repeatone>
;   <icon-consume>
;   <icon-prev>
;   <icon-stop>
;   <icon-play>
;   <icon-pause>
;   <icon-next>
;   <icon-seekb>
;   <icon-seekf>
; format-online = <icon-prev> <icon-seekb> <icon-stop> <toggle> <icon-seekf> <icon-next>  <icon-repeat> <icon-random>  <bar-progress> <label-time>  <label-song>
format-online = <label-song>
;format-playing = ${self.format-online}
;format-paused = ${self.format-online}
;format-stopped = ${self.format-online}

; Available tags:
;   <label-offline>
; Default: ""
;format-offline = <label-offline>

; Available tokens:
;   %artist%
;   %album-artist%
;   %album%
;   %date%
;   %title%
; Default: %artist% - %title%
label-song = яАБ  %title%

; Available tokens:
;   %elapsed%
;   %total%
; Default: %elapsed% / %total%
;label-time = %elapsed% / %total%

; Available tokens:
;   None
label-offline = ЁЯОЬ mpd is offline

; Only applies if <icon-X> is used
icon-play = тП╡
icon-pause = тП╕
icon-stop = тП╣
icon-prev = тПо
icon-next = тПн
icon-seekb = тПк
icon-seekf = тПй
icon-random = ЁЯФА
icon-repeat = ЁЯФБ
icon-repeatone = ЁЯФВ
icon-single = ЁЯФВ
icon-consume = тЬА

; Used to display the state of random/repeat/repeatone/single
; Only applies if <icon-[random|repeat|repeatone|single]> is used
toggle-on-foreground = #ff
toggle-off-foreground = #55

; Only applies if <bar-progress> is used
bar-progress-width = 10
bar-progress-indicator = |
bar-progress-fill = тФА
bar-progress-empty = тФА

[module/pad]
type = custom/text
format = "   "

[module/left-decor]
type = custom/text
format = "юВ╢"
format-background = ${colors.background}
format-foreground = ${colors.background-alt}

[module/right-decor]
type = custom/text
format = "юВ┤"
format-background = ${colors.background}
format-foreground = ${colors.background-alt}

[module/polywins]
type = custom/script
exec = ~/.config/bspwm/polybar/scripts/polywins.sh 2>/dev/null
format = <label>
format-background = ${colors.background}
label = %output%
label-padding = 0
tail = true

[module/launcher]
type = custom/text
format = " B "
format-font = 7
format-foreground = ${colors.color3}
format-background = ${colors.background-alt}
click-left = dmenu_hub

; [module/currency]
; format = <label>
; label = %{F#dfae67}яЕХ %{F#A0A8CD}%output%
; type = custom/script
; exec = "cat ~/.cache/cash/rate"
; interval=600

[module/bspwm]
type = internal/bspwm

enable-click = true
pin-workspaces = true

format = <label-state>
format-font = 1

ws-icon-default = ґ░Ка

label-focused = ґ░оп
label-focused-padding = 1
label-focused-foreground = ${colors.color2}
label-focused-background = ${colors.background}
label-focused-font = 1

label-occupied = ґ░Ка
label-occupied-padding = 1
label-occupied-foreground= ${colors.color3}
label-occupied-background = ${colors.background}
label-occupied-font = 1

label-urgent = %icon%
label-urgent-foreground = #88C0D0
label-urgent-background = ${colors.background}
label-urgent-padding = 4

label-empty = ґ░Ка
label-empty-foreground = ${colors.color4}
label-empty-background = ${colors.background}
label-empty-font = 1
label-empty-padding = 1

[module/alsa]
type = internal/alsa
format-volume = <label-volume> <bar-volume>
format-volume-background = ${colors.background}
label-volume-foreground = ${colors.color4}
format-muted-foreground = ${colors.foreground}
format-muted-background = ${colors.background}
label-muted = "яСж  Muted"
label-volume = "ґ░ОИ "

format-muted-padding = 1

bar-volume-format = %{T1}%fill%%indicator%%empty%%{F-}%{T-}
bar-volume-width = 8
bar-volume-gradient = false
bar-volume-indicator = "яСД"
bar-volume-indicator-foreground = ${colors.foreground}
bar-volume-fill = "тФА"
bar-volume-foreground-0 = ${colors.color2}
bar-volume-foreground-1 = ${colors.color2}
bar-volume-foreground-2 = ${colors.color3}
bar-volume-foreground-3 = ${colors.color1}
bar-volume-empty = "тФА"
bar-volume-empty-foreground = ${colors.foreground}

[module/time]
type = internal/date
interval = 60

format = <label>
format-background = ${colors.background}
format-foreground = ${colors.color4}

date =ґ░еФ  %I:%M %P%{F-}
time-alt = ґ░Гн  %a, %b %d%{F-}

label = %date%%time%

[module/powermenu]
type = custom/text
format ="яАС "
format-padding = 2
click-left = sysact &
format-foreground = ${colors.color1}

[module/wlan]
type = internal/network
interface = wlp1s0
interval = 3.0
format-connected =  <label-connected>
label-connected = "ґ░дк %{A1:networkmanager_dmenu &:} %essid%%{A}"
label-connected-foreground = ${colors.color2}
label-connected-background = ${colors.background}
label-disconnected = "ґ░дн %{A1:networkmanager_dmenu &:} Offline%{A}"
label-disconnected-foreground = ${colors.color3}
label-disconnected-background = ${colors.background}

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 99

format-charging = <animation-charging><label-charging>
label-charging = %percentage%%
format-charging-foreground = ${colors.color4}
format-charging-background = ${colors.background}
format-charging-padding = 1

format-discharging = <ramp-capacity><label-discharging>
label-discharging = %percentage%%
format-discharging-foreground = ${colors.foreground}
format-discharging-background = ${colors.background}
format-discharging-padding = 1

format-full-prefix = "яЙА  "
format-full-prefix-foreground = ${colors.color2}
format-foreground = ${colors.color4}
format-background = ${colors.background}
format-full-background = ${colors.background}
format-full-padding = 1

label-discharging-foreground = ${colors.foreground}
ramp-capacity-foreground = ${colors.color2}
label-charging-foreground = ${colors.foreground}
label-charging-background = ${colors.background}

label-padding = 1

ramp-capacity-0 = "яЙД  "
ramp-capacity-1 = "яЙГ  "
ramp-capacity-2 = "яЙВ  "
ramp-capacity-3 = "яЙБ  "
ramp-capacity-4 = "яЙА  "

animation-charging-0 = "яЙД  "
animation-charging-1 = "яЙГ  "
animation-charging-2 = "яЙВ  "
animation-charging-3 = "яЙБ  "
animation-charging-4 = "яЙА  "

animation-charging-foreground = ${colors.color3}
animation-charging-background = ${colors.background}
animation-charging-framerate = 750

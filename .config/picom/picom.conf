# ‚ĖĄ‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚Ėą ‚Ėą‚ĖÄ‚ĖĄ‚ĖÄ‚Ėą ‚ĖĄ‚ĖÄ‚Ėą ‚ĖÄ‚Ėą‚ĖÄ ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚Ėą‚ĖÄ
# ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚ĖĎ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚ĖĎ‚Ėą‚ĖĎ ‚Ėą ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚ĖĄ‚Ėą

animations: true;
animation-stiffness = 200
animation-window-mass = 0.5
animation-dampening = 18
animation-clamping = false
animation-for-open-window = "zoom"; #open window
animation-for-unmap-window = "zoom"; #minimize window
animation-for-workspace-switch-in = "slide-right"; #the windows in the workspace that is coming in
animation-for-workspace-switch-out = "slide-left"; #the windows in the workspace that are coming out
animation-for-transient-window = "slide-down"; #popup windows


# ‚Ėą‚ĖÄ ‚Ėą‚ĖĎ‚Ėą ‚ĖĄ‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚ĖĄ ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĎ‚Ėą‚ĖĎ‚Ėą
# ‚ĖĄ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖÄ ‚Ėą‚ĖĄ‚Ėą ‚ĖÄ‚ĖĄ‚ĖÄ‚ĖĄ‚ĖÄ

shadow = true;
shadow-radius = 10;
shadow-opacity = 0.3;
shadow-offset-x = -10;
shadow-offset-y = -10;

# shadow-red = 0
# shadow-green = 0
# shadow-blue = 0
shadow-color = "#000000";

shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g = 'dwm' ",
  "class_g = 'librewolf'",
  "class_g = 'Librewolf' && argb",
  "class_g = 'Rofi'",
  "_GTK_FRAME_EXTENTS@:c",
  "_NET_WM_STATE@:32a *= '_NET_WM_STATE_HIDDEN'"
];

# shadow-exclude-reg = "x10+0+0";
# xinerama-shadow-crop = true;

# ‚Ėą‚ĖÄ‚ĖÄ ‚ĖĄ‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚ĖĄ ‚Ėą ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ
# ‚Ėą‚ĖÄ‚ĖĎ ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖÄ ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚Ėą

fading = true;
fade-in-step = 0.02;
fade-out-step = 0.02;
fade-delta = 2;

fade-exclude = [];

no-fading-openclose = false;
no-fading-destroyed-argb = true;

# ‚ĖÄ‚Ėą‚ĖÄ ‚Ėą‚ĖÄ‚Ėą ‚ĖĄ‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚Ėą‚ĖÄ ‚Ėą‚ĖÄ‚Ėą ‚ĖĄ‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖĄ‚Ėą
# ‚ĖĎ‚Ėą‚ĖĎ ‚Ėą‚ĖÄ‚ĖĄ ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚ĖĄ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚ĖĄ ‚Ėą‚Ėą‚ĖĄ ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖĄ ‚ĖĎ‚Ėą‚ĖĎ

inactive-opacity = 1;
frame-opacity = 1;
inactive-opacity-override = false;
active-opacity = 1.0;
inactive-dim = 0.1;

focus-exclude = [
	"class_g = 'Cairo-clock'",
	"class_g ?= 'rofi'",
	"class_g ?= 'slop'",
];

# inactive-dim-fixed = 1.0;

opacity-rule = [
	"90:class_g = 'URxvt'",
	"80:class_g = 'UXTerm'",
	"80:class_g = 'XTerm'"
]

# ‚Ėą‚ĖĄ‚ĖĄ ‚Ėą‚ĖĎ‚ĖĎ ‚Ėą‚ĖĎ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ

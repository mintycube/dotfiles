# ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ
# ‚Ėą‚ĖĄ‚ĖĄ ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖÄ‚ĖĄ ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚Ėą‚Ėą‚ĖĄ ‚Ėą‚ĖÄ‚ĖĄ ‚ĖĄ‚Ėą

# Sets the radius of rounded window corners. When > 0, the compositor will
# round the corners of windows. Does not interact well with
# `transparent-clipping`.
corner-radius = 0
# corner-radius = 6;

# Exclude conditions for rounded corners.
rounded-corners-exclude = [
    "name   *= 'tint2'",
    "class_g = 'dwm' ",
    "class_g = 'dmenu' ",
    # "name   *= 'jgmenu'",
    "name   *= 'screenkey'",
    "name   *= 'polybar'",
    "window_type = 'dock'",
    "window_type = 'desktop'",
];

# ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ‚Ėą ‚ĖĄ‚ĖÄ‚Ėą ‚Ėą‚ĖĎ‚ĖĎ
# ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚Ėą‚ĖĄ ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚Ėą‚Ėą‚ĖĄ ‚Ėą‚ĖÄ‚ĖĄ ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĄ‚ĖĄ

daemon = false;
backend = "glx";
vsync = true;
dbus = false;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
refresh-rate = 0;
# use-ewmh-active-win = true;
# unredir-if-possible = false;
# unredir-if-possible-delay = 0;

unredir-if-possible-exclude = [];

detect-transient = true;
detect-client-leader = true;
resize-damage = 1;

invert-color-include = [];

glx-no-stencil = true;
# glx-no-rebind-pixmap = false;
use-damage = true;
# xrender-sync-fence = true;

# glx-fshader-win = "";
# force-win-blend = false;

# no-ewmh-fullscreen = false;
# max-brightness = 1.0;

transparent-clipping = false;

#log-level = "warn";
#log-file = "~/.cache/picom-log.log";
show-all-xerrors = true;
# write-pid-path = '/path/to/your/mom';

wintypes: {
	tooltip = { fade = true; shadow = false; focus = false; };
	normal = { shadow = true; };
	dock = { shadow = false; };
	dnd = { shadow = false; };
	popup_menu = { shadow = true; focus = false; };
	dropdown_menu = { shadow = true; focus = false; };
	above = { shadow = true; };
	splash = { shadow = false; };
	utility = { focus = false; shadow = false; blur-background = false; };
	notification = { shadow = true; };
	desktop = { shadow = false; blur-background = false; };
	menu = { focus = false; };
	dialog = { shadow = true; };
};
